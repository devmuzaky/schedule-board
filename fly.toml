# Fly.io config for schedule-board backend API
# 1. Complete billing: https://fly.io/dashboard/mohamed-zaky/billing
# 2. fly postgres create --name schedule-board-db  (or use Neon.tech for free DB)
# 3. fly secrets set DATABASE_URL="..." JWT_SECRET="$(openssl rand -base64 32)"
# 4. fly deploy

app = "schedule-board"

[build]
  dockerfile = "Dockerfile"

[env]
  PORT = "3000"
  NODE_ENV = "production"

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0
  processes = ["app"]

# Minimal VM for free tier (stays under ~$5/month)
[[vm]]
  memory = "256mb"
  cpu_kind = "shared"
  cpus = 1
