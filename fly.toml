# Fly.io config for schedule-board backend API
# Deploy: fly deploy (from repo root)
# Secrets: fly secrets set DATABASE_URL=... JWT_SECRET=...

app = "schedule-board"

[build]
  dockerfile = "Dockerfile"

[env]
  PORT = "3000"
  NODE_ENV = "production"

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0
  processes = ["app"]

[[vm]]
  memory = "256mb"
  cpu_kind = "shared"
  cpus = 1
