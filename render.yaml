# Render Blueprint - Schedule Board Backend + PostgreSQL
# Deploy via: https://dashboard.render.com/select-repo?type=blueprint

databases:
  - name: schedule-board-db
    plan: free

services:
  - type: web
    name: schedule-board-api
    runtime: node
    region: oregon
    plan: free

    rootDir: node-server

    buildCommand: npm install && npx prisma generate && npm run build
    startCommand: npx prisma migrate deploy && npx prisma db seed && node dist/index.js

    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: schedule-board-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: NODE_ENV
        value: production
